name: Daily AWS News Refresh

on:
  schedule:
    - cron: '3 0 * * *'   # 12:03 AM UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest AWS news
        run: npm run update-news

      - name: Commit and push if news changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No new items — skipping commit."
          else
            git commit -m "chore: refresh news.json [bot]"
            git push
          fi
