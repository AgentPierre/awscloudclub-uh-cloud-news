name: Daily AWS News Refresh

on:
  schedule:
    - cron: '3 0 * * *'   # 00:03 UTC every day
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Fetch latest AWS news
        run: npm run update-news

      - name: Commit and push if news changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No new items — skipping commit."
          else
            git commit -m "chore: refresh news.json [bot]"
            git push
          fi
