<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AWS Cloud News Dashboard aggregating official AWS RSS feeds." />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self';" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()" />
    <title>AWS Cloud News Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section class="breaking-news-ticker" aria-label="Breaking News ticker">
      <span class="ticker-label">Breaking News</span>
      <div class="ticker-track">
        <span id="breakingNewsTickerText">Loading latest AWS headlines...</span>
      </div>
    </section>
    <div class="page-bg-glow" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">☁</div>
          <div>
            <h1>AWS Cloud News</h1>
            <p>Real-time Updates from Official Sources</p>
          </div>
        </div>
      </header>

      <section class="filters" aria-label="News sources">
        <div class="tabs-scroll" id="tabs"></div>
      </section>

      <section class="cards-grid" id="cards" aria-live="polite"></section>

      <footer class="app-footer">
        <span id="lastUpdated">Last updated: —</span>
      </footer>
    </main>

    <template id="cardSkeletonTemplate">
      <article class="news-card skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line medium"></div>
      </article>
    </template>

    <script src="./scripts/app.js" defer></script>
  </body>
</html>
